# Loads client-side datapacks globally (not per-world) so Cobblemon riding seat data
# for datapack-defined mounts is present on the client and the rider renders in multiplayer.
# See project_cobblemon_riding_client_data memory. Server has no globalpacks mod (modsplit
# excludes it) so this config is inert server-side.
config_version = 4
enable_system_global_packs = false
log_pack_ids = false

[resourcepacks]
	required = []
	enable_builtin = []

[datapacks]
	required = ["datapacks/"]
	optional = []
	enable_builtin = []
